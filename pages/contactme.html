	<div class="thoughts-container">

		 <article class="answers">
          <h1>Recommend Your Favorite Restaurant!</h1>
          <p>I'd love to try even MORE restaurants in new york city. Feel free to send me some recommendations, and I'll be sure to try it.</p>

          <form action="https://formspree.io/f/xojydypz" method="POST" enctype="multipart/form-data">
            <label for="experience">Where is the restaurant?</label><br>

            <select id="experience" name="experience" required>
              <option value="">-- Choose one --</option>
              <option value="Book">Manhattan</option>
              <option value="Movie">Brooklyn</option>
              <option value="Both">Other</option>
            </select><br>
            <br>
            <label for="reason">Restaurant Name + What's your review?</label><br>
            <textarea id="reason" name="reason" rows="5" cols="40" placeholder="Write a few sentences here..." required></textarea><br><br>

            
            <input type="submit" value="Send">
          </form>
        </article>
